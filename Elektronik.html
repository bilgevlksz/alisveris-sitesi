<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bi Bak Yavvv - Elektronik</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root {
      --primary: #ff8a00;
      --secondary: #e52e71;
      --bg: #f5f5f7;
      --text: #333;
      --card-bg: #fff;
      --shadow: rgba(0,0,0,0.1);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    a, button { text-decoration: none; border: none; background: none; font: inherit; color: inherit; cursor: pointer; }
    .navbar {
      background: linear-gradient(135deg,var(--primary),var(--secondary));
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 12px var(--shadow);
    }
    .logo { color: #fff; font-size: 1.8rem; font-weight: 700; }
    .search-bar { flex: 1; max-width: 400px; margin: 0 24px; position: relative; }
    .search-bar input {
      width: 100%; padding: 10px 48px 10px 16px;
      border-radius: 24px; border: 1px solid #ddd;
      transition: box-shadow .3s;
    }
    .search-bar input:focus { box-shadow: 0 0 8px var(--shadow); outline: none; }
    .search-bar .fa-search {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      color: #888; font-size: 1.2rem;
    }
    .cart-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; background: var(--card-bg);
      border-radius: 24px; box-shadow: 0 2px 8px var(--shadow);
      transition: transform .2s;
    }
    .cart-btn:hover { transform: scale(1.05); }
    .cart-count {
      background: var(--secondary); color: #fff;
      border-radius: 50%; padding: 4px 8px; font-size: .8rem;
    }
    .breadcrumbs {
      max-width: 1200px; margin: 24px auto 0; padding: 0 32px;
      font-size: .9rem; color: #666;
    }
    .breadcrumbs a { color: var(--secondary); }
    .subscribe {
      background: #fff; padding: 32px 24px;
      text-align: center; margin: 24px auto; max-width: 800px;
      border-radius: 12px; box-shadow: 0 4px 12px var(--shadow);
      display: flex; flex-direction: column; gap: 16px;
    }
    .subscribe h3 { font-weight: 600; }
    .subscribe form {
      display: flex; justify-content: center; flex-wrap: wrap; gap: 8px;
    }
    .subscribe input {
      flex: 1; min-width: 200px;
      padding: 12px 16px; border: 1px solid #ccc;
      border-radius: 6px;
    }
    .subscribe .sub-btn {
      padding: 12px 24px; background: var(--secondary);
      color: #fff; border-radius: 6px;
      transition: background .3s;
    }
    .subscribe .sub-btn:hover { background: #bf265c; }
    .controls {
      max-width: 1200px; margin: 0 auto;
      padding: 0 32px;
      display: flex; align-items: center;
      justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      margin-top: 24px;
    }
    .controls select, .controls button {
      padding: 8px 12px; border: 1px solid #ccc;
      border-radius: 6px; background: #fff;
    }
    #filter-panel { display: none; max-width: 1200px; margin: 16px auto 32px; padding: 0 32px; }
    .filter-group {
      background: #fff; padding: 16px;
      border-radius: 8px; box-shadow: 0 2px 8px var(--shadow);
      margin-bottom: 16px;
    }
    .filter-group h5 { margin-bottom: 12px; font-weight: 600; }
    .filter-group label { display: block; margin-bottom: 8px; }
    .filter-group .range-value { margin-top: 8px; font-size: .9rem; }
    #products {
      display: grid; grid-template-columns: repeat(auto-fill,minmax(300px,1fr));
      gap: 24px; max-width: 1200px;
      margin: 0 auto 40px; padding: 0 32px;
    }
    .product {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 12px var(--shadow);
      overflow: hidden;
      position: relative;
      display: flex; flex-direction: column;
      transition: transform .3s, box-shadow .3s;
    }
    .product:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 24px var(--shadow);
    }
    .product img {
  width: 100%; 
  height: 200px; 
  object-fit: contain; /* cover yerine contain kullanın */
  background: #f5f5f5; /* Arka plan rengi ekleyin */
  padding: 10px; /* Görsele biraz boşluk ekleyin */
}
    .product .info {
      padding: 16px; flex: 1;
      display: flex; flex-direction: column;
    }
    .product .info h4 { margin: 0 0 12px; font-weight: 600; flex: 1; }
    .product .info .price { margin-bottom: 12px; font-weight: 700; color: var(--primary); }
    .product .info .actions { display: flex; gap: 8px; }
    .product .info .actions button {
      flex: 1; padding: 10px; border-radius: 6px;
      transition: background .3s; font-weight: 600;
    }
    .add { background: var(--primary); color: #fff; }
    .add:hover { background: #e06e00; }
    .fav { background: #fff; color: var(--secondary); border: 1px solid var(--secondary); }
    .fav.active, .fav:hover { background: var(--secondary); color: #fff; }
    .pagination { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; }
    .fav-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; background: var(--card-bg);
  border-radius: 24px; box-shadow: 0 2px 8px var(--shadow);
  transition: transform .2s; color: var(--secondary);
}
.fav-btn:hover { transform: scale(1.05); color: var(--secondary); }
    .pagination button { padding: 8px 12px; border: 1px solid #ccc; background: #fff; border-radius: 6px; }
    .pagination button.active, .pagination button:hover { background: var(--secondary); color: #fff; border-color: var(--secondary); }
    #back-to-top {
      position: fixed; bottom: 30px; right: 30px;
      width: 50px; height: 50px; background: var(--secondary);
      color: #fff; border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      box-shadow: 0 4px 12px var(--shadow);
      opacity: 0; visibility: hidden;
      transition: opacity .3s;
      z-index: 100;
    }
    #back-to-top.show { opacity: 1; visibility: visible; }
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: rgba(0,0,0,0.8); color: #fff;
      padding: 10px 15px; border-radius: 5px;
      animation: fadeInOut 3s forwards;
    }
    @keyframes fadeInOut { 0%{opacity:0;transform:translateY(20px);}10%{opacity:1;transform:translateY(0);}90%{opacity:1;}100%{opacity:0;transform:translateY(20px);} }
    footer { background: #444; color: #fff; text-align: center; padding: 20px; margin-top: auto; }
  </style>
</head>
<body>
  <nav class="navbar">
  <div class="logo" onclick="location.href='index.html'">Bi Bak Yavvv</div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Elektronik ara..." onkeypress="if(event.key==='Enter') applyFilter()" />
    <i class="fa fa-search" onclick="applyFilter()"></i>
  </div>
  <div style="display:flex;gap:12px;">
    <button class="fav-btn" onclick="location.href='favorilerim.html'">
      <i class="fa fa-heart"></i> Favorilerim
    </button>
    <div class="cart-btn" onclick="location.href='sepet.html'">
      <i class="fa-solid fa-cart-shopping"></i>
      Sepetim <span id="cart-count" class="cart-count">0</span>
    </div>
  </div>
</nav>

  <div class="breadcrumbs"><a href="index.html">Anasayfa</a> &gt; <span>Elektronik</span></div>

  <div class="subscribe">
    <h3>Haftalık Elektronik Fırsatları Kaçırma</h3>
    <form onsubmit="subscribe(); return false;" style="display:flex; justify-content:center; gap:8px; flex-wrap:wrap;">
      <input type="email" id="newsletter" placeholder="E-posta adresinizi girin" required />
      <button type="submit" class="sub-btn">Abone Ol</button>
    </form>
  </div>
  <div class="controls">
    <select id="sort-select" onchange="sortProducts()">
      <option value="popularity">Popülerlik</option>
      <option value="price-asc">Fiyata Göre (Artan)</option>
      <option value="price-desc">Fiyata Göre (Azalan)</option>
    </select>
    <button onclick="toggleFilter()">Filtre</button>
    <div class="view-toggle">
      <button id="grid-btn" class="active" onclick="setView('grid')"><i class="fa fa-th-large"></i></button>
      <button id="list-btn" onclick="setView('list')"><i class="fa fa-list"></i></button>
    </div>
  </div>
  <div id="filter-panel">
    <div class="filter-group">
      <h5>Kategori</h5>
      <label><input type="checkbox" value="telefon" onchange="applyFilter()"> Telefon</label>
      <label><input type="checkbox" value="bilgisayar" onchange="applyFilter()"> Bilgisayar</label>
      <label><input type="checkbox" value="aksesuar" onchange="applyFilter()"> Aksesuar</label>
      <label><input type="checkbox" value="tablet" onchange="applyFilter()"> Tablet</label>
    </div>
    <div class="filter-group">
      <h5>Fiyat Aralığı</h5>
      <input type="range" id="price-range" min="0" max="10000" step="100" value="10000" oninput="updatePrice()" />
      <div class="range-value">0 - ₺<span id="price-value">10000</span></div>
    </div>
  </div>

  <div id="products"></div>
  <div class="pagination" id="pagination"></div>

  <button id="back-to-top"><i class="fa fa-chevron-up"></i></button>
  <footer>&copy; 2025 Bi Bak Yavvv. Tüm hakları saklıdır.</footer>

  <script>
    const CART_KEY='sepet', FAV_KEY='favoriler';
    let cart=JSON.parse(localStorage.getItem(CART_KEY))||[], favs=JSON.parse(localStorage.getItem(FAV_KEY))||[];
const products = [
    {id:1, name:'İphone 15 Pro Max', category:'telefon', price:74299, image:'img/telefon1.jpeg', desc:'Pro kamera sistemi ve A16 çipi'},
    {id:2, name:'MacBook Pro 14"', category:'bilgisayar', price:24999, image:'img/bilgisayar1.jpeg', desc:'M2 Pro çipli profesyonel laptop'},
    {id:3, name:'AirPods Pro 2', category:'aksesuar', price:1599, image:'img/aksesuar1.jpeg', desc:'Aktif gürültü engellemeli'},
    {id:4, name:'Apple Watch Ultra', category:'aksesuar', price:2999, image:'img/aksesuar2.jpeg', desc:'Sporcular için gelişmiş özellikler'},
    {id:5, name:'JBL Flip 6', category:'aksesuar', price:899, image:'img/aksesuar3.jpeg', desc:'Su geçirmez taşınabilir hoparlör'},
    {id:6, name:'iPad Pro 12.9"', category:'tablet', price:18999, image:'img/tablet1.jpeg', desc:'M2 çipli profesyonel tablet'},
    {id:7, name:'Samsung S23 Ultra', category:'telefon', price:23999, image:'img/telefon2.jpeg', desc:'200MP kamera ve S Pen desteği'},
    {id:8, name:'Dell XPS 15', category:'bilgisayar', price:22999, image:'img/bilgisayar2.jpeg', desc:'4K OLED ekranlı premium laptop'},
    {id:9, name:'Sony WH-1000XM5', category:'aksesuar', price:2499, image:'img/aksesuar4.jpeg', desc:'Ses kalitesi lideri kulaklık'},
    {id:10, name:'Logitech MX Master 3S', category:'aksesuar', price:1299, image:'img/aksesuar5.jpeg', desc:'Profesyonel kullanıcılar için fare'},
    {id:11, name:'Xiaomi 13 Pro', category:'telefon', price:15999, image:'img/telefon3.jpeg', desc:'1 inç sensörlü kamera'},
    {id:12, name:'Asus ROG Zephyrus', category:'bilgisayar', price:32999, image:'img/bilgisayar3.jpeg', desc:'RTX 4080 li oyuncu laptopu'},
    {id:13, name:'Samsung Buds2 Pro', category:'aksesuar', price:1299, image:'img/aksesuar6.jpeg', desc:'24-bit Hi-Fi ses kalitesi'},
    {id:14, name:'GoPro Hero 11', category:'aksesuar', price:3999, image:'img/aksesuar7.jpeg', desc:'5.3K video çekim özelliği'},
    {id:15, name:'Samsung Tab S8 Ultra', category:'tablet', price:14999, image:'img/tablet2.jpeg', desc:'14.6" büyük ekran tablet'},
    {id:16, name:'Oppo Find X5 Pro', category:'telefon', price:13999, image:'img/telefon4.jpeg', desc:'Hassas renklerle fotoğrafçılık'},
    {id:17, name:'Lenovo Yoga 9i', category:'bilgisayar', price:18999, image:'img/bilgisayar4.jpeg', desc:'360° dönebilen dokunmatik ekran'},
    {id:18, name:'Anker 737 PowerBank', category:'aksesuar', price:999, image:'img/aksesuar8.jpeg', desc:'140W hızlı şarj desteği'},
    {id:19, name:'LG UltraFine 4K', category:'aksesuar', price:5999, image:'img/aksesuar9.jpeg', desc:'Renk hassasiyetli monitör'},
    {id:20, name:'Microsoft Surface Pro 9', category:'tablet', price:16999, image:'img/tablet3.jpeg', desc:'Windows 11 ile güçlü hibrit'},
    {id:21, name:'OnePlus 11 5G', category:'telefon', price:12999, image:'img/telefon5.jpeg', desc:'Hassas renklerle 120Hz ekran'},
    {id:22, name:'HP Spectre x360', category:'bilgisayar', price:19999, image:'img/bilgisayar5.jpeg', desc:'Şık tasarım ve güçlü performans'},
    {id:23, name:'Razer Blade 15', category:'bilgisayar', price:28999, image:'img/bilgisayar6.jpeg', desc:'Oyuncular için ince ve güçlü'},
    {id:24, name:'Bose QuietComfort 45', category:'aksesuar', price:1999, image:'img/aksesuar10.jpeg', desc:'Üstün gürültü engelleme'},
    {id:25, name:'DJI Mini 3 Pro', category:'aksesuar', price:8999, image:'img/aksesuar11.jpeg', desc:'Hafif ve güçlü drone'},
    {id:26, name:'Huawei MatePad Pro', category:'tablet', price:10999, image:'img/tablet4.jpeg', desc:'HarmonyOS ile uyumlu'},
    {id:27, name:'Nintendo Switch OLED', category:'oyun', price:5999, image:'img/oyun1.jpeg', desc:'7" OLED ekranlı oyun konsolu'},
    {id:28, name:'PlayStation 5', category:'oyun', price:12999, image:'img/oyun2.jpeg', desc:'4K 120Hz oyun deneyimi'},
    {id:29, name:'Xbox Series X', category:'oyun', price:10999, image:'img/oyun3.jpeg', desc:'12 TFLOPS grafik performansı'},
    {id:30, name:'Steam Deck 512GB', category:'oyun', price:8999, image:'img/oyun4.jpeg', desc:'Taşınabilir PC oyun deneyimi'}
];
   
    let filtered=products.slice(),currentPage=1,perPage=6,viewMode='grid';
    function updateCartCount(){document.getElementById('cart-count').textContent=cart.length;}
    function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
    function subscribe(){const mail=document.getElementById('newsletter').value; if(mail) showToast('Kaydınız alındı!');}
    function toggleFilter(){const p=document.getElementById('filter-panel');p.style.display=p.style.display==='none'?'block':'none';}
    function updatePrice(){document.getElementById('price-value').textContent=document.getElementById('price-range').value;applyFilter();}
    function applyFilter(){const q=document.getElementById('search-input').value.toLowerCase();const cats=Array.from(document.querySelectorAll('#filter-panel input[type=checkbox]:checked')).map(cb=>cb.value);const maxP=+document.getElementById('price-range').value;filtered=products.filter(p=>p.name.toLowerCase().includes(q)&&(!cats.length||cats.includes(p.category))&&p.price<=maxP);currentPage=1;render();}
    function sortProducts(){const v=document.getElementById('sort-select').value;if(v==='price-asc')filtered.sort((a,b)=>a.price-b.price);else if(v==='price-desc')filtered.sort((a,b)=>b.price-a.price);applyFilter();}
    function setView(m){viewMode=m;document.getElementById('products').className='products '+(m+'-view');document.getElementById('grid-btn').classList.toggle('active',m==='grid');document.getElementById('list-btn').classList.toggle('active',m==='list');}
    function render(){const c=document.getElementById('products');c.innerHTML='';const start=(currentPage-1)*perPage,end=start+perPage;filtered.slice(start,end).forEach(p=>{const d=document.createElement('div');d.className='product';d.innerHTML=`<img src="${p.image}" alt="${p.name}"/><div class="info"><h4>${p.name}</h4><p class="price">₺${p.price}</p><div class="actions"><button class="add" onclick="addToCart(${p.id})">Sepete Ekle</button><button class="fav ${favs.includes(p.id)?'active':''}" onclick="toggleFav(${p.id})"><i class="fa fa-heart"></i></button></div></div>`;c.appendChild(d);});renderPagination();updateCartCount();}
    function addToCart(id){const p=products.find(x=>x.id===id);cart.push({id:p.id,ad:p.name,adet:1,fiyat:p.price});localStorage.setItem(CART_KEY,JSON.stringify(cart));updateCartCount();showToast('Sepete eklendi');}
    function toggleFav(id){favs=favs.includes(id)?favs.filter(x=>x!==id):[...favs,id];localStorage.setItem(FAV_KEY,JSON.stringify(favs));render();showToast(favs.includes(id)?'Favorilere eklendi':'Favorilerden kaldırıldı');}
    function renderPagination(){const pag=document.getElementById('pagination');pag.innerHTML='';const pageCount=Math.ceil(filtered.length/perPage);for(let i=1;i<=pageCount;i++){const btn=document.createElement('button');btn.textContent=i;btn.className=i===currentPage?'active':'';btn.onclick=()=>{currentPage=i;render();};pag.appendChild(btn);} }
    document.getElementById('back-to-top').onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
    window.addEventListener('scroll',()=>{const b=document.getElementById('back-to-top');window.pageYOffset>300?b.classList.add('show'):b.classList.remove('show');});
    render();updateCartCount();

    
function updateCartCount() {
  document.getElementById('cart-count').textContent = cart.reduce((total, item) => total + (item.quantity || 1), 0);
}

function addToCart(id) {
  const p = products.find(x => x.id === id); // Ürünü bul
  cart.push({
    id: p.id,
    ad: p.name,
    adet: 1,
    fiyat: p.price
  });
  localStorage.setItem(CART_KEY, JSON.stringify(cart)); // LocalStorage'e kaydet
  updateCartCount(); // Sepet sayacını güncelle
  showToast('Sepete eklendi'); // Bildirim göster
}


    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
    function toggleFilter() {
      const p = document.getElementById('filter-panel');
      p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }
    function updatePrice() {
      document.getElementById('price-value').textContent = document.getElementById('price-range').value;
      applyFilter();
    }
 
function applyFilter() {
  const selectedCategories = [];
  
  // Kategorileri filtrelemek için seçilen checkbox'ları kontrol et
  document.querySelectorAll('#filter-panel input[type="checkbox"]:checked').forEach(checkbox => {
    selectedCategories.push(checkbox.value); // Seçilen kategori değerini diziye ekle
  });

  // Eğer hiçbir kategori seçilmediyse, tüm ürünleri göster
  if (selectedCategories.length === 0) {
    filtered = products;
  } else {
    // Kategorilere göre filtrele
    filtered = products.filter(product => 
      selectedCategories.includes(product.category)
    );
  }

  render(); // Filtrelenmiş ürünleri render et
}

    function sortProducts() {
      const v = document.getElementById('sort-select').value;
      if (v === 'discount-desc') {
        filtered.sort((a,b) => (b.orig-b.price) - (a.orig-a.price));
      } else if (v === 'price-asc') {
        filtered.sort((a,b) => a.price - b.price);
      } else if (v === 'price-desc') {
        filtered.sort((a,b) => b.price - a.price);
      }
      render();
    } 
function renderCart() {
  const cartContainer = document.getElementById('cart-items');
  cartContainer.innerHTML = '';
  
  if (cart.length === 0) {
    cartContainer.innerHTML = '<p>Sepetinizde ürün yok.</p>';
    return;
  }
  
  cart.forEach(item => {
    const product = products.find(p => p.id === item.id);
    if (product) {
      const itemElement = document.createElement('div');
      itemElement.className = 'cart-item';
      itemElement.innerHTML = `
        <img src="${product.image}" alt="${product.name}" width="80">
        <div>
          <h4>${product.name}</h4>
          <p>Fiyat: ₺${product.price}</p>
          <p>Miktar: ${item.quantity}</p>
          <p>Toplam: ₺${(product.price * item.quantity).toFixed(2)}</p>
          <button onclick="removeFromCart(${item.id})">Kaldır</button>
        </div>
      `;
      cartContainer.appendChild(itemElement);
    }
  });
  
  // Toplam fiyat hesapla
  const total = cart.reduce((sum, item) => {
    const product = products.find(p => p.id === item.id);
    return sum + (product.price * item.quantity);
  }, 0);
  
  cartContainer.innerHTML += `<div class="cart-total">Toplam: ₺${total.toFixed(2)}</div>`;
}

function removeFromCart(id) {
  cart = cart.filter(item => item.id !== id);
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
  renderCart();
  updateCartCount();
}


    
    function renderPagination() {
      const pag = document.getElementById('pagination');
      pag.innerHTML = '';
      const pages = Math.ceil(filtered.length / perPage);
      for(let i=1;i<=pages;i++){
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = i===currentPage?'active':'';
        btn.onclick = ()=>{ currentPage=i; render(); };
        pag.appendChild(btn);
      }
    }


    function toggleFav(id) {
      let favs = JSON.parse(localStorage.getItem('favoriler'))||[];
      favs = favs.includes(id) ? favs.filter(x=>x!==id) : [...favs,id];
      localStorage.setItem('favoriler', JSON.stringify(favs));
      render();
      showToast(favs.includes(id)? 'Favorilere eklendi':'Favorilerden kaldırıldı');
    }
    document.getElementById('back-to-top').onclick = ()=> window.scrollTo({top:0,behavior:'smooth'});
    window.addEventListener('scroll', ()=>{
      const b = document.getElementById('back-to-top');
      window.scrollY>300 ? b.classList.add('show') : b.classList.remove('show');
    });
    render(); updateCartCount();
  </script>
</body>
</html>
