    a, button { text-decoration:none; border:none; background:none; font:inherit; color:inherit; cursor:pointer; }
    .navbar { background: linear-gradient(135deg,var(--primary),var(--secondary)); display:flex; align-items:center; justify-content:space-between; padding:16px 32px; position:sticky; top:0; z-index:100; box-shadow:0 4px 12px var(--shadow); }
    .logo { color:#fff; font-size:1.8rem; font-weight:700; }
    .search-bar { flex:1; max-width:500px; margin:0 24px; position:relative; }
    .search-bar input { width:100%; padding:10px 48px 10px 16px; border-radius:24px; border:1px solid #ddd; transition:box-shadow .3s; }
    .search-bar input:focus { box-shadow:0 0 8px var(--shadow); outline:none; }
    .search-bar .fa-search { position:absolute; right:16px; top:50%; transform:translateY(-50%); color:#888; font-size:1.2rem; }
    .cart-btn { display:flex; align-items:center; gap:8px; padding:8px 16px; background:var(--card-bg); border-radius:24px; box-shadow:0 2px 8px var(--shadow); transition:transform .2s; }

    .breadcrumbs a { color:var(--secondary); }
    .subscribe { background:#fff; padding:32px 24px; text-align:center; margin:24px auto; max-width:800px; border-radius:12px; box-shadow:0 4px 12px var(--shadow); display:flex; flex-direction:column; gap:16px; }
    .subscribe h3 { font-weight:600; }
    .subscribe form { display:flex; justify-content:center; flex-wrap:wrap; gap:8px; }
    .subscribe input { flex:1; min-width:200px; padding:12px 16px; border:1px solid #ccc; border-radius:6px; }
    .subscribe .sub-btn { padding:12px 24px; background:var(--secondary); color:#fff; border-radius:6px; transition:background .3s; }
    .subscribe .sub-btn:hover { background:#bf265c; }
    .controls { max-width:1200px; margin:0 auto; padding:0 32px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-top:24px; }
    .controls select, .controls button { padding:8px 12px; border:1px solid #ccc; border-radius:6px; background:#fff; }
    .view-toggle { display:flex; gap:8px; }
    .view-toggle button { width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
    .view-toggle .active { background:var(--secondary); color:#fff; border-color:var(--secondary); }
    #filter-panel { display:none; max-width:1200px; margin:16px auto 32px; padding:0 32px; }
    .filter-group { background:#fff; padding:16px; border-radius:8px; box-shadow:0 2px 8px var(--shadow); margin-bottom:16px; }
    .filter-group h5 { margin-bottom:12px; font-weight:600; }
    .filter-group label { display:block; margin-bottom:8px; }
    .filter-group .range-value { margin-top:8px; font-size:.9rem; }
    #products.grid-view { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:24px; max-width:1200px; margin:0 auto 40px; padding:0 32px; }
    #products.list-view { display:flex; flex-direction:column; align-items:center; gap:24px; margin:0 auto 40px; padding:0 32px; }
    .product { background:var(--card-bg); border-radius:12px; box-shadow:0 4px 12px var(--shadow); overflow:hidden; position:relative; transition:transform .3s,box-shadow .3s; display:flex; flex-direction:column; }
    .product:hover { transform:translateY(-8px); box-shadow:0 8px 24px var(--shadow); }
    #products.list-view .product { flex-direction:row; height:180px; }
    .product img { width:100%; height:200px; object-fit:contain; }
    #products.list-view .product img { width:220px; height:100%; }
    .product .info { padding:16px; flex:1; display:flex; flex-direction:column; }
    .product .info h4 { margin:0 0 12px; font-weight:600; flex:1; }
    .product .info .price { margin-bottom:12px; font-weight:700; color:var(--primary); }
    .product .info .actions { display:flex; gap:8px; }
    .product .info .actions button { flex:1; padding:10px; border-radius:6px; transition:background .3s; font-weight:600; }
    .add { background:var(--primary); color:#fff; }

    .fav { background:#fff; color:var(--secondary); border:1px solid var(--secondary); }

    .product::after { content:'Hızlı Görünüm'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); background:rgba(0,0,0,0.6); color:#fff; padding:8px 16px; border-radius:4px; font-size:.9rem; transition:transform .3s; }
    .product:hover::after { transform:translate(-50%,-50%) scale(1); }
    .pagination { display:flex; justify-content:center; gap:10px; margin-bottom:40px; }
    .pagination button { padding:8px 12px; border:1px solid #ccc; background:#fff; border-radius:6px; }
    .pagination button.active, .pagination button:hover { background:var(--secondary); color:#fff; border-color:var(--secondary); }
    #back-to-top { position:fixed; bottom:30px; right:30px; width:50px; height:50px; background:var(--secondary); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px var(--shadow); opacity:0; visibility:hidden; transition:opacity .3s; z-index:100; }

    let filtered=products.slice(),currentPage=1,perPage=6,viewMode='grid';
    function updateCartCount(){document.getElementById('cart-count').textContent=cart.length;}
    function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
    function subscribe(){const mail=document.getElementById('newsletter').value; if(mail) showToast('Kaydınız alındı!');}
    function toggleFilter(){const p=document.getElementById('filter-panel');p.style.display=p.style.display==='none'?'block':'none';}
    function updatePrice(){document.getElementById('price-value').textContent=document.getElementById('price-range').value;applyFilter();}
    function applyFilter(){const q=document.getElementById('search-input').value.toLowerCase();const cats=Array.from(document.querySelectorAll('#filter-panel input[type=checkbox]:checked')).map(cb=>cb.value);const maxP=+document.getElementById('price-range').value;filtered=products.filter(p=>p.name.toLowerCase().includes(q)&&(!cats.length||cats.includes(p.category))&&p.price<=maxP);currentPage=1;render();}
    function sortProducts(){const v=document.getElementById('sort-select').value;if(v==='price-asc')filtered.sort((a,b)=>a.price-b.price);else if(v==='price-desc')filtered.sort((a,b)=>b.price-a.price);applyFilter();}
    function setView(m){viewMode=m;document.getElementById('products').className='products '+(m+'-view');document.getElementById('grid-btn').classList.toggle('active',m==='grid');document.getElementById('list-btn').classList.toggle('active',m==='list');}
    function render(){const c=document.getElementById('products');c.innerHTML='';const start=(currentPage-1)*perPage,end=start+perPage;filtered.slice(start,end).forEach(p=>{const d=document.createElement('div');d.className='product';d.innerHTML=`<img src="${p.image}" alt="${p.name}"/><div class="info"><h4>${p.name}</h4><p class="price">₺${p.price}</p><div class="actions"><button class="add" onclick="addToCart(${p.id})">Sepete Ekle</button><button class="fav ${favs.includes(p.id)?'active':''}" onclick="toggleFav(${p.id})"><i class="fa fa-heart"></i></button></div></div>`;c.appendChild(d);});renderPagination();updateCartCount();}
    function addToCart(id){const p=products.find(x=>x.id===id);cart.push({id:p.id,ad:p.name,adet:1,fiyat:p.price});localStorage.setItem(CART_KEY,JSON.stringify(cart));updateCartCount();showToast('Sepete eklendi');}
    function toggleFav(id){favs=favs.includes(id)?favs.filter(x=>x!==id):[...favs,id];localStorage.setItem(FAV_KEY,JSON.stringify(favs));render();showToast(favs.includes(id)?'Favorilere eklendi':'Favorilerden kaldırıldı');}
    function renderPagination(){const pag=document.getElementById('pagination');pag.innerHTML='';const pageCount=Math.ceil(filtered.length/perPage);for(let i=1;i<=pageCount;i++){const btn=document.createElement('button');btn.textContent=i;btn.className=i===currentPage?'active':'';btn.onclick=()=>{currentPage=i;render();};pag.appendChild(btn);} }
    document.getElementById('back-to-top').onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
    window.addEventListener('scroll',()=>{const b=document.getElementById('back-to-top');window.pageYOffset>300?b.classList.add('show'):b.classList.remove('show');});
    render();updateCartCount();

    
function updateCartCount() {
  document.getElementById('cart-count').textContent = cart.reduce((total, item) => total + (item.quantity || 1), 0);
}

function addToCart(id) {
  const p = products.find(x => x.id === id); // Ürünü bul
  cart.push({
    id: p.id,
    ad: p.name,
    adet: 1,
    fiyat: p.price
  });
  localStorage.setItem(CART_KEY, JSON.stringify(cart)); // LocalStorage'e kaydet
  updateCartCount(); // Sepet sayacını güncelle
  showToast('Sepete eklendi'); // Bildirim göster
}


    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
    function toggleFilter() {
      const p = document.getElementById('filter-panel');
      p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }
    function updatePrice() {
      document.getElementById('price-value').textContent = document.getElementById('price-range').value;
      applyFilter();
    }
    function applyFilter() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const cats = Array.from(document.querySelectorAll('#filter-panel input[type=checkbox]:checked'))
                        .map(cb => cb.value);
      const maxP = +document.getElementById('price-range').value;
      filtered = products.filter(p =>
        p.name.toLowerCase().includes(q) &&
        (cats.length ? cats.includes(p.category) : true) &&
        p.price <= maxP
      );
      currentPage = 1;
      render();
    }
    function sortProducts() {
      const v = document.getElementById('sort-select').value;
      if (v === 'discount-desc') {
        filtered.sort((a,b) => (b.orig-b.price) - (a.orig-a.price));
      } else if (v === 'price-asc') {
        filtered.sort((a,b) => a.price - b.price);
      } else if (v === 'price-desc') {
        filtered.sort((a,b) => b.price - a.price);
      }
      render();
    } 
function renderCart() {
  const cartContainer = document.getElementById('cart-items');
  cartContainer.innerHTML = '';
  
  if (cart.length === 0) {
    cartContainer.innerHTML = '<p>Sepetinizde ürün yok.</p>';
    return;
  }
  
  cart.forEach(item => {
    const product = products.find(p => p.id === item.id);
    if (product) {
      const itemElement = document.createElement('div');
      itemElement.className = 'cart-item';
      itemElement.innerHTML = `
        <img src="${product.image}" alt="${product.name}" width="80">
        <div>
          <h4>${product.name}</h4>
          <p>Fiyat: ₺${product.price}</p>
          <p>Miktar: ${item.quantity}</p>
          <p>Toplam: ₺${(product.price * item.quantity).toFixed(2)}</p>
          <button onclick="removeFromCart(${item.id})">Kaldır</button>
        </div>
      `;
      cartContainer.appendChild(itemElement);
    }
  });
  
  // Toplam fiyat hesapla
  const total = cart.reduce((sum, item) => {
    const product = products.find(p => p.id === item.id);
    return sum + (product.price * item.quantity);
  }, 0);
  
  cartContainer.innerHTML += `<div class="cart-total">Toplam: ₺${total.toFixed(2)}</div>`;
}

function removeFromCart(id) {
  cart = cart.filter(item => item.id !== id);
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
  renderCart();
  updateCartCount();
}


    
    function renderPagination() {
      const pag = document.getElementById('pagination');
      pag.innerHTML = '';
      const pages = Math.ceil(filtered.length / perPage);
      for(let i=1;i<=pages;i++){
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = i===currentPage?'active':'';
        btn.onclick = ()=>{ currentPage=i; render(); };
        pag.appendChild(btn);
      }
    }


    function toggleFav(id) {
      let favs = JSON.parse(localStorage.getItem('favoriler'))||[];
      favs = favs.includes(id) ? favs.filter(x=>x!==id) : [...favs,id];
      localStorage.setItem('favoriler', JSON.stringify(favs));
      render();
      showToast(favs.includes(id)? 'Favorilere eklendi':'Favorilerden kaldırıldı');
    }
    document.getElementById('back-to-top').onclick = ()=> window.scrollTo({top:0,behavior:'smooth'});
    window.addEventListener('scroll', ()=>{
      const b = document.getElementById('back-to-top');
      window.scrollY>300 ? b.classList.add('show') : b.classList.remove('show');
    });
    render(); updateCartCount();
  </script>
